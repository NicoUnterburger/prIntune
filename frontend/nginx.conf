server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Treiber-ZIPs können groß sein – Standard-Limit (1 MB) anheben.
    client_max_body_size 200m;

    # SPA: alle nicht gefundenen Pfade auf index.html zurückfallen lassen.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API an das Backend im selben Compose-Netzwerk weiterleiten.
    # "backend" ist der Service-Name aus docker-compose.yml.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Downloads/Uploads nicht abschneiden.
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
